<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Multi Timer</title>

  <link rel="stylesheet" href="style.css" />

  <!-- XLSX для Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="app-wrapper">

  <!-- ===================== -->
  <!-- ГЛАВНЫЙ ЭКРАН -->
  <!-- ===================== -->

  <div id="mainScreen" class="app">

    <div id="timers" class="timers-wrapper"></div>

    <button id="addTimer">+</button>

    <div class="bottom-panel">
      <div id="settings" class="settings-text-btn">Настройки</div>
      <div id="export" class="settings-text-btn">Экспорт в Excel</div>
    </div>

  </div>


  <!-- ===================== -->
  <!-- ЭКРАН НАСТРОЕК -->
  <!-- ===================== -->

  <div id="settingsScreen" class="screen">

    <div class="settings-header">
      <button id="backBtn" class="back-btn">←</button>
      <h2>Настройки</h2>
    </div>

    <div class="settings-card">

      <!-- 🔥 НОВАЯ КНОПКА -->
      <button id="exportArchive" class="settings-btn">
        Выгрузить архив (7 дней)
      </button>

      <button id="clearAll" class="settings-btn danger">
        Очистить все таймеры
      </button>

    </div>

    <div class="version">
      Версия 1.0<br>
      Разработано Бойцовым Александром
    </div>

  </div>

</div>


<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="script.js"></script>

</body>
</html>
