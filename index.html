<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Multi Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app-wrapper">

    <!-- ===== MAIN SCREEN ===== -->
    <div id="mainScreen" class="app">

      <!-- 🔥 ВАЖНО: grid сразу на этом контейнере -->
      <div id="timers" class="timers-wrapper"></div>

      <!-- кнопка + -->
      <button id="addTimer">+</button>

      <!-- нижняя панель -->
      <div class="bottom-panel">

        <!-- три точки -->
       <button id="settings" class="settings-text-btn">
  Настройки
</button>

        <!-- Excel -->
        <button id="export" class="settings-text-btn">
  Экспорт в Excel
</button>

      </div>
    </div>

    <!-- ===== SETTINGS SCREEN ===== -->
    <div id="settingsScreen" class="screen">

  <div class="settings-header">
    <button id="backBtn" class="back-btn">←</button>
    <h2>Настройки</h2>
  </div>

  <div class="settings-card">

    <button id="clearAll" class="settings-btn danger">
      Удалить все таймеры
    </button>

    <p class="version">Версия 1.0 
      <br>Разработано Бойцовым Александром
    <br>via ChatGPT
    </p>

  </div>

</div>

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- твой JS -->
  <script src="script.js"></script>
<div id="toast" class="toast"></div>
</body>
</html>
