<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Multi Timer</title>

  <link rel="stylesheet" href="style.css" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; 
  script-src 'self'; style-src 'self' 'unsafe-inline';">
</head>

<body>

<div class="app-wrapper">

  <!-- ===================== -->
  <!-- ГЛАВНЫЙ ЭКРАН -->
  <!-- ===================== -->

  <div id="mainScreen" class="app">

    <div id="timers" class="timers-wrapper"></div>

    <!-- ПУСТОЕ СОСТОЯНИЕ -->
    <div id="emptyState" class="empty-state">
  <div class="empty-state-title">Нажмите «+»</div>
  <div class="empty-state-text">чтобы добавить таймер</div>
</div>

    <button id="addTimer">+</button>

    <div class="bottom-panel">
  <div id="settings" class="settings-text-btn">Настройки</div>
<div id="clearAll" class="settings-text-btn danger-text-btn">
  Удалить все
</div>
  <div id="export" class="settings-text-btn">Экспорт в Excel</div>

</div>

  </div>

  <!-- ===================== -->
  <!-- ЭКРАН НАСТРОЕК -->
  <!-- ===================== -->


  <div id="settingsScreen" class="screen">

    <div class="settings-header">
      <div id="backBtn" class="settings-text-btn">Назад</div>
      <h2>Настройки</h2>
    </div>

    <div class="settings-card">

       <button id="checkUpdates" class="settings-btn">
  Проверка обновлений
</button>


      <button id="exportArchive" class="settings-btn">
        Выгрузить архив (7 дней)
      </button>

      <button id="clearArchive" class="settings-btn danger">
        Очистить архив
      </button>



    </div>

    <div class="version">
      Версия 1.5
      <br> prod by BAA & NK 
      <br> with ChatGPT's help
    </div>

  </div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>
<script src="xlsx.full.min.js"></script>
<script src="script.js"></script>

</body>
</html>
