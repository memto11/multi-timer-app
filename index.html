<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Multi Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app-wrapper">

    <!-- ===== MAIN SCREEN ===== -->
    <div id="mainScreen" class="app">

      <!-- 🔥 ВАЖНО: grid сразу на этом контейнере -->
      <div id="timers" class="timers-wrapper"></div>

      <!-- кнопка + -->
      <button id="addTimer">+</button>

      <!-- нижняя панель -->
      <div class="bottom-panel">

        <!-- три точки -->
        <button id="settings" class="icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <circle cx="12" cy="5" r="2" fill="white"/>
            <circle cx="12" cy="12" r="2" fill="white"/>
            <circle cx="12" cy="19" r="2" fill="white"/>
          </svg>
        </button>

        <!-- Excel -->
        <button id="export" class="icon-btn">
          <svg width="22" height="22" viewBox="0 0 24 24">
            <rect x="7" y="3" width="14" height="18" rx="2" fill="#21A366"/>
            <path d="M10 7H18M10 11H18M10 15H18M10 19H18"
              stroke="white" stroke-width="1.2" opacity="0.7"/>
            <rect x="3" y="6" width="9" height="12" rx="1.5" fill="#107C41"/>
            <path d="M5.4 9.2L7 11.7L5.3 14.8H6.8L7.8 12.8L8.9 14.8H10.4L8.6 11.6L10.2 9.2H8.8L7.9 10.8L7 9.2H5.4Z"
              fill="white"/>
          </svg>
        </button>

      </div>
    </div>

    <!-- ===== SETTINGS SCREEN ===== -->
    <div id="settingsScreen" class="screen">

  <div class="settings-header">
    <button id="backBtn" class="back-btn">←</button>
    <h2>Настройки</h2>
  </div>

  <div class="settings-card">

    <button id="toggleTheme" class="settings-btn">
      Сменить тему
    </button>

    <button id="clearAll" class="settings-btn danger">
      Удалить все таймеры
    </button>

    <p class="version">Версия 1.0 
      <br>Разработано Бойцовым Александром</p>

  </div>

</div>

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- твой JS -->
  <script src="script.js"></script>
<div id="toast" class="toast"></div>
</body>
</html>
