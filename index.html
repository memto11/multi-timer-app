<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Multi Timer</title>

  <link rel="stylesheet" href="style.css" />

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="app-wrapper">

  <!-- ===================== -->
  <!-- ГЛАВНЫЙ ЭКРАН -->
  <!-- ===================== -->

  <div id="mainScreen" class="app">

    <!-- Таймеры -->
    <div id="timers" class="timers-wrapper"></div>

    <!-- 🔥 ПУСТОЕ СОСТОЯНИЕ -->
    <div id="emptyState" class="empty-state">
      <div class="empty-state-title">Нет таймеров</div>
      <div class="empty-state-text">
        Нажмите «+», чтобы добавить первый таймер
      </div>
    </div>

    <!-- Кнопка добавления -->
    <button id="addTimer">+</button>

    <!-- Нижняя панель -->
    <div class="bottom-panel">
      <div id="settings" class="settings-text-btn">Настройки</div>
      <div id="export" class="settings-text-btn">Экспорт в Excel</div>
    </div>

  </div>


  <!-- ===================== -->
  <!-- ЭКРАН НАСТРОЕК -->
  <!-- ===================== -->

  <div id="settingsScreen" class="screen">

    <div class="settings-header">
      <button id="backBtn" class="back-btn">←</button>
      <h2>Настройки</h2>
    </div>

    <div class="settings-card">

      <button id="exportArchive" class="settings-btn">
        Выгрузить архив за 7 дней (Бета)
      </button>

      <button id="clearAll" class="settings-btn danger">
        Очистить все таймеры
      </button>

    </div>

    <div class="version">
      Версия 1.0<br>
      Разработано Александром @boutdog Бойцовым 
    </div>

  </div>

</div>


<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="script.js"></script>

</body>
</html>
